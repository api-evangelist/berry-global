description: >-
  Berry Global is a leading global manufacturer and marketer of plastic packaging
  products, nonwoven specialty materials, and engineered materials for consumer and
  industrial end markets. In 2024, Berry Global merged with Amcor to form one of
  the world's largest packaging companies. Berry's products include rigid open top
  packaging, closures and dispensing systems, flexible packaging, tapes, and
  engineered materials.
